# -*- coding: utf-8 -*-
# @Author: acharlet

# Physical and grid parameters

# rhoNorm MUST be the name of a density of the system

# Run information
mode        shells          # shells / MWN
runname     cooling_fid
rhoNorm     rho4
geometry    spherical       # cartesian / spherical

# Grid and sim parameters
Nsh1        500     # number of cells in shell 1
Next        20       # number of cells of external medium for each side
stop        time     # stopping condition: time / it 
itmax       5000   # max number of iterations
itdump      50      # dump data file every itdump iterations

# Hydro parameters, in CGS
# For shells: (Ek or rho), (D0 or ton), u, (R0 or t0)
L           1e52      # central engine kinetic power
Theta0      5e-5      # shells relativistic temperature, default 5e-5
rhoContr    5e-2      # shells to external medium density contrast, default 5e-2
#Ek1         1e52
u1          100 
t1          1.
#Ek4         1e52
u4          200 
t4          1.
toff        1.

# Radiative parameters
chi_sh      0.01            # shock detection threshold

# microphysics parameters
psyn       2.5              # slope of electron distribution
eps_B      0.1              # fraction of int. energy in B field
eps_e      1/3              # fraction of int. energy in the acc e-
xi_e       1e-2             # accelerated electron fraction

# source parameters
z          1                # redshift

